name: ❓ Question
description: Ask a question about Trafikinfo SE (integration or card)
labels: ["question"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part is your question about? This is used to auto-label the issue.
      options:
        - Integration
        - Alert Card
        - Both
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true

  - type: markdown
    attributes:
      label: Component
      description: What is your question about?
      options:
        - Integration
        - Card
        - Both
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Describe what you need help with.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share relevant details, configuration, and what you already tried.
