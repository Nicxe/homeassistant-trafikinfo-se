name: Validate

on:
  push:
    branches: [dev, beta, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: nicxe/.github/.github/workflows/reusable-validate-integration.yml@main
    with:
      hacs_category: "integration"
      run_hassfest: true
    secrets: inherit

  validate-card:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check card syntax
        run: node --experimental-default-type=module --check www/trafikinfo-se-alert-card.js
